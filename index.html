<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusApp | Productivity</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar glass-panel">
            <div class="logo">
                <i class="ph-fill ph-infinity"></i>
                <span>FocusApp</span>
            </div>
            <nav>
                <a href="#" class="active"><i class="ph ph-kanban"></i> Tasks</a>
                <a href="#"><i class="ph ph-timer"></i> Pomodoro</a>
                <a href="#"><i class="ph ph-calendar"></i> Calendar</a>
                <a href="#"><i class="ph ph-chart-bar"></i> Statistics</a>
            </nav>
        </aside>

        <main class="content">
            <header>
                <h1>Task Management</h1>
                <button class="btn-primary" id="addTaskBtn">
                    <i class="ph ph-plus"></i> New Task
                </button>
            </header>

            <section class="kanban-board">
                <div class="column glass-panel" data-status="todo">
                    <h2>To Do</h2>
                    <div class="task-list" id="todo-list"></div>
                </div>
                <div class="column glass-panel" data-status="progress">
                    <h2>In Progress</h2>
                    <div class="task-list" id="progress-list"></div>
                </div>
                <div class="column glass-panel" data-status="done">
                    <h2>Done</h2>
                    <div class="task-list" id="done-list"></div>
                </div>
            </section>

            <section class="pomodoro-widget glass-panel">
                <h2>Focus Timer</h2>
                <div class="timer-display" id="timer">25:00</div>
                <div class="timer-controls">
                    <button class="btn-secondary" id="startTimer">Start</button>
                    <button class="btn-secondary" id="pauseTimer">Pause</button>
                    <button class="btn-secondary" id="resetTimer">Reset</button>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
