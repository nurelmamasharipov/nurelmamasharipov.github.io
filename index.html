<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width">
  <title>Мои напоминания</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Напоминалка</h1>

    <!-- Форма добавления -->
    <div class="add-form">
      <input type="text" id="taskInput"
             placeholder="Добавить напоминание...">
      <input type="datetime-local" id="timeInput">
      <button onclick="addReminder()">Добавить</button>
    </div>

    <!-- Список напоминаний -->
    <ul id="reminderList"></ul>
  </div>
  <script src="app.js"></script>
</body>
</html>
