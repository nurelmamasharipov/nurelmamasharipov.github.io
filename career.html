<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Career Details | Career Path Finder for Students</title>
    <meta
      name="description"
      content="Browse career descriptions, required skills, salaries, and learning roadmaps."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Sora:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="data.js" defer></script>
    <script src="script.js" defer></script>
  </head>
  <body data-page="career">
    <div class="page-backdrop">
      <div class="glow glow--left"></div>
      <div class="glow glow--right"></div>
      <div class="noise-grid"></div>
    </div>

    <header class="site-header container">
      <a class="brand" href="index.html">
        <span class="brand__logo">CP</span>
        <span class="brand__text">
          <strong>Career Path Finder</strong>
          <small>for students</small>
        </span>
      </a>

      <nav class="nav" aria-label="Main navigation">
        <a href="index.html" data-nav="home">Home</a>
        <a href="test.html" data-nav="test">Test</a>
        <a href="results.html" data-nav="results">Results</a>
        <a href="career.html" data-nav="career">Careers</a>
      </nav>

      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle color theme">
        <span class="theme-toggle__thumb"></span>
      </button>
    </header>

    <main class="container page-section">
      <section class="career-layout">
        <aside class="surface career-menu">
          <div class="section-head section-head--tight">
            <p class="eyebrow">Career list</p>
            <h2>Browse careers</h2>
          </div>
          <div class="career-menu__list" id="careerList"></div>
        </aside>

        <section id="careerDetail"></section>
      </section>
    </main>
  </body>
</html>
